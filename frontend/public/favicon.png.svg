<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- Background circle -->
  <circle cx="24" cy="24" r="23" fill="url(#bg-grad)" stroke="url(#border-grad)" stroke-width="1.5"/>
  
  <!-- Document/Page shape -->
  <rect x="21" y="8" width="16" height="20" rx="2" fill="white" fill-opacity="0.95"/>
  <!-- Document lines -->
  <rect x="24" y="13" width="9" height="2" rx="1" fill="#c4b5fd"/>
  <rect x="24" y="18" width="7" height="2" rx="1" fill="#c4b5fd"/>
  <rect x="24" y="23" width="5" height="2" rx="1" fill="#c4b5fd"/>
  
  <!-- Magnifying glass -->
  <circle cx="19" cy="25" r="9" fill="none" stroke="white" stroke-width="3"/>
  <circle cx="19" cy="25" r="8" fill="none" stroke="#7C3AED" stroke-width="2"/>
  <!-- Handle -->
  <line x1="25" y1="31" x2="32" y2="38" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="25" y1="31" x2="32" y2="38" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Checkmark in glass -->
  <path d="M14 25 l3 4 7-7" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Gradients -->
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="48" y2="48">
      <stop offset="0%" stop-color="#4C1D95"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </linearGradient>
    <linearGradient id="border-grad" x1="0" y1="0" x2="48" y2="48">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
</svg>
